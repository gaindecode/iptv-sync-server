spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

app:
  pair-code:
    length: 6
    expiry-minutes: 10
  websocket:
    ping-interval-ms: 30000
  cors:
    allowed-origins: http://localhost:3000
